name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (Steam Deck)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            build-essential

      - name: Cache Wails binary
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: wails-v2.12.0-linux

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -platform linux/amd64 -tags webkit2_41

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deckanator-linux-amd64
          path: build/bin/Deckanator

  build-mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Wails binary
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: wails-v2.12.0-macos

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'
          CGO_LDFLAGS: '-framework CoreFoundation -framework AppKit -framework UniformTypeIdentifiers'
        run: wails build -platform darwin/amd64

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package macOS DMG
        run: |
          create-dmg \
            --volname "Deckanator" \
            --background "build/dmg/background.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Deckanator.app" 150 200 \
            --hide-extension "Deckanator.app" \
            --app-drop-link 450 200 \
            deckanator-macos.dmg \
            build/bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deckanator-macos
          path: deckanator-macos.dmg

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Wails binary
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails.exe
          key: wails-v2.12.0-windows

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -platform windows/amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deckanator-windows
          path: build/bin/Deckanator.exe

  build-installer:
    name: Installer (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build installer
        run: GOOS=linux GOARCH=amd64 go build -o deckanator-installer-linux-amd64 ./cmd/installer/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deckanator-installer-linux-amd64
          path: deckanator-installer-linux-amd64

  build-flatpak:
    name: Flatpak (Linux)
    runs-on: ubuntu-22.04
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: deckanator-linux-amd64
          path: dist/

      - name: Install flatpak tools
        run: sudo apt-get install -y flatpak flatpak-builder

      - name: Cache Flatpak runtime
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-gnome-49

      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y org.gnome.Platform//49 org.gnome.Sdk//49

      - name: Prepare sources
        run: |
          sudo apt-get install -y imagemagick
          cp dist/Deckanator build/flatpak/Deckanator
          convert build/appicon.png -resize 512x512 build/flatpak/icon.png

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --repo=flatpak-repo flatpak-builddir build/flatpak/io.github.sedyh.Deckanator.yaml
          flatpak build-bundle flatpak-repo deckanator.flatpak io.github.sedyh.Deckanator

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deckanator-flatpak
          path: deckanator.flatpak

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-mac, build-windows, build-installer, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: deckanator-linux-amd64
          path: dist/

      - name: Download macOS app
        uses: actions/download-artifact@v4
        with:
          name: deckanator-macos
          path: dist/

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: deckanator-installer-linux-amd64
          path: dist/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: deckanator-windows
          path: dist/

      - name: Download Flatpak
        uses: actions/download-artifact@v4
        with:
          name: deckanator-flatpak
          path: dist/

      - name: Rename Linux binary
        run: mv dist/Deckanator dist/deckanator-linux-amd64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/deckanator-linux-amd64
            dist/deckanator-macos.dmg
            dist/Deckanator.exe
            dist/deckanator-installer-linux-amd64
            dist/deckanator.flatpak
            install.sh
          generate_release_notes: true

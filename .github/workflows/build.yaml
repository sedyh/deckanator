name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (Steam Deck)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            build-essential

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform linux/amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deckanator-linux-amd64
          path: build/bin/Deckanator

  build-mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'
          CGO_LDFLAGS: '-framework CoreFoundation -framework AppKit -framework UniformTypeIdentifiers'
        run: wails build -platform darwin/amd64

      - name: Package macOS app
        run: hdiutil create -volname Deckanator -srcfolder build/bin/Deckanator.app -ov -format UDZO deckanator-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deckanator-macos
          path: deckanator-macos.dmg

  build-installer:
    name: Installer (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build installer
        run: GOOS=linux GOARCH=amd64 go build -o deckanator-installer-linux-amd64 ./cmd/installer/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deckanator-installer-linux-amd64
          path: deckanator-installer-linux-amd64

  build-flatpak:
    name: Flatpak (Linux)
    runs-on: ubuntu-22.04
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: deckanator-linux-amd64
          path: dist/

      - name: Install flatpak tools
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y org.gnome.Platform//44 org.gnome.Sdk//44

      - name: Prepare sources
        run: |
          cp dist/Deckanator build/flatpak/Deckanator
          cp build/appicon.png build/flatpak/icon.png

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --repo=flatpak-repo flatpak-builddir build/flatpak/io.github.sedyh.Deckanator.yml
          flatpak build-bundle flatpak-repo deckanator.flatpak io.github.sedyh.Deckanator

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deckanator-flatpak
          path: deckanator.flatpak

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-mac, build-installer, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: deckanator-linux-amd64
          path: dist/

      - name: Download macOS app
        uses: actions/download-artifact@v4
        with:
          name: deckanator-macos
          path: dist/

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: deckanator-installer-linux-amd64
          path: dist/

      - name: Download Flatpak
        uses: actions/download-artifact@v4
        with:
          name: deckanator-flatpak
          path: dist/

      - name: Rename Linux binary
        run: mv dist/Deckanator dist/deckanator-linux-amd64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/deckanator-linux-amd64
            dist/deckanator-macos.dmg
            dist/deckanator-installer-linux-amd64
            dist/deckanator.flatpak
            install.sh
          generate_release_notes: true

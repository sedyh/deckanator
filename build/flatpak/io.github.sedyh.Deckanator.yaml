app-id: io.github.sedyh.Deckanator
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: Deckanator

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --filesystem=home
  - --device=all
  - --env=GST_PLUGIN_FEATURE_RANK=openh264enc:NONE,openh264dec:NONE
  - --env=JSC_SIGNAL_FOR_GC=40

modules:
  - name: libmanette
    buildsystem: meson
    config-opts:
      - --libdir=lib
      - -Dintrospection=false
      - -Dvapi=false
      - -Dbuild-tests=false
      - -Ddemos=false
      - -Ddoc=false
    sources:
      - type: archive
        url: https://github.com/GNOME/libmanette/archive/refs/tags/0.2.13.tar.gz
        sha256: a297eedaf95526de8313f87cf4fbea02cbe1f5cf4b7b30ffa64db63e59b302e9
        mirror-urls:
          - https://gitlab.gnome.org/GNOME/libmanette/-/archive/0.2.13/libmanette-0.2.13.tar.gz
      - type: file
        path: patches/libmanette-steamdeck-uaf.patch
        dest-filename: steamdeck-uaf.patch
      - type: shell
        commands:
          - patch -p1 --verbose --no-backup-if-mismatch < steamdeck-uaf.patch
          - grep -q "if (!MANETTE_IS_BACKEND" src/manette-backend.c
          - grep -q "g_object_ref (self)" src/manette-hid-backend.c
          - grep -q "g_object_ref (self)" src/manette-evdev-backend.c
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/gir-1.0
      - /share/vala

  - name: deckanator
    buildsystem: simple
    build-commands:
      - install -Dm755 Deckanator /app/bin/Deckanator
      - install -Dm644 icon.png /app/share/icons/hicolor/256x256/apps/io.github.sedyh.Deckanator.png
      - install -Dm644 io.github.sedyh.Deckanator.desktop /app/share/applications/io.github.sedyh.Deckanator.desktop
    sources:
      - type: file
        path: Deckanator
      - type: file
        path: icon.png
      - type: file
        path: io.github.sedyh.Deckanator.desktop

app-id: io.github.sedyh.Deckanator
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: Deckanator

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --filesystem=home
  - --device=all
  - --env=GST_PLUGIN_FEATURE_RANK=openh264enc:NONE,openh264dec:NONE

modules:
  - name: libmanette
    buildsystem: meson
    config-opts:
      - -Dintrospection=false
      - -Dvapi=false
      - -Dbuild-tests=false
      - -Ddemos=false
      - -Ddoc=false
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/libmanette.git
        tag: '0.2.13'
      - type: patch
        path: patches/libmanette-disable-hid-backend.patch
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/gir-1.0
      - /share/vala

  - name: deckanator
    buildsystem: simple
    build-commands:
      - install -Dm755 Deckanator /app/bin/Deckanator
      - install -Dm644 icon.png /app/share/icons/hicolor/256x256/apps/io.github.sedyh.Deckanator.png
      - install -Dm644 io.github.sedyh.Deckanator.desktop /app/share/applications/io.github.sedyh.Deckanator.desktop
    sources:
      - type: file
        path: Deckanator
      - type: file
        path: icon.png
      - type: file
        path: io.github.sedyh.Deckanator.desktop

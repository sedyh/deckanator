app-id: io.github.sedyh.Deckanator
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: Deckanator

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --filesystem=home
  - --device=all
  # The in-app updater installs the downloaded bundle on the host via
  # flatpak-spawn --host.
  - --talk-name=org.freedesktop.Flatpak
  - --env=GST_PLUGIN_FEATURE_RANK=openh264enc:NONE,openh264dec:NONE
  - --env=GTK_MODULES=

modules:
  - name: libmanette
    buildsystem: meson
    config-opts:
      - --libdir=lib
      - -Dintrospection=false
      - -Dvapi=false
      - -Dbuild-tests=false
      - -Ddemos=false
      - -Ddoc=false
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/libmanette.git
        commit: b083b38874fb2204370c1ee62dd16833eec71aff
      - type: shell
        commands:
          - grep -q "g_clear_object (&self->driver)" src/manette-hid-backend.c
          # The Steam Deck hid driver is the only pad source the sandbox
          # sees in gaming mode, but its lizard-mode writes (digital
          # mappings + settings, re-sent by a watchdog) fight Steam
          # Input over the controller's state and double-step the dpad
          # in Steam's own menus. Neuter the writes, keep the reads:
          # Steam already handles lizard mode while it runs.
          - sed -i '/^disable_lizard_mode (ManetteSteamDeckDriver \*self)$/{n;s|^{$|{\n  return TRUE; /* no writes - Steam Input owns the controller state */|;}' src/drivers/manette-steam-deck-driver.c
          - grep -q "no writes - Steam Input owns" src/drivers/manette-steam-deck-driver.c
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/gir-1.0
      - /share/vala

  - name: deckanator
    buildsystem: simple
    build-commands:
      - install -Dm755 Deckanator /app/bin/Deckanator
      - install -Dm644 icon.png /app/share/icons/hicolor/256x256/apps/io.github.sedyh.Deckanator.png
      - install -Dm644 io.github.sedyh.Deckanator.desktop /app/share/applications/io.github.sedyh.Deckanator.desktop
    sources:
      - type: file
        path: Deckanator
      - type: file
        path: icon.png
      - type: file
        path: io.github.sedyh.Deckanator.desktop
